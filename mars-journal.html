<div class="article">

<h2>火星咖啡馆的下午</h2>

<p class="date">2026.06.10</p>

<p>
今天路过火星北半球的一家小咖啡馆。
</p>

<p>
窗外是一望无际的红色荒原。
没有树木，也没有鸟鸣。
只有风吹过沙丘的声音。
</p>

<p>
店主说这里已经三个月没有下雨。
我点了一杯黑咖啡。
坐在窗边发呆。
</p>

<p>
忽然想起地球上的桂花树。
想起雨后的青石路。
想起那些熟悉又遥远的人。
</p>

<p>
火星依然安静。
而安静，有时也是一种温柔。
</p>

<p>
—— 漫游的梦想家<br>
LiYang Music
</p>
