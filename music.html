<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音乐馆 Music</title>

<style>
body{
    background:#070b1a;
    color:white;
    font-family:serif;
    text-align:center;
    padding:40px;
}

h1{
    color:#d4a73c;
}

.player{
    margin-top:50px;
}
.gallery{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    max-width:1000px;
    margin:40px auto;
}

.gallery img{
    width:100%;
    border-radius:12px;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.03);
}
audio{
    width:90%;
    max-width:500px;
}
</style>
</head>

<body>

<h1>漫游的梦想家 · 音乐馆</h1>
<div class="gallery">
<img src="01.PNG">
<img src="02.PNG">
<img src="03.PNG">

<img src="04.PNG">
<img src="05.PNG">
<img src="06.PNG">

<img src="07.PNG">
<img src="08.PNG">
<img src="09.PNG">
</div>

<p>Wandering Dreamer Music Space</p>

<div class="player">

<img src="01.PNG" width="500">
<h2>01 爱情咏叹调</h2>
<audio controls>
<source src="爱情咏叹调.mp3" type="audio/mpeg">
</audio>

<img src="02.PNG" width="500">
<h2>02 老顽童</h2>
<audio controls>
<source src="老顽童.mp3" type="audio/mpeg">
</audio>

<img src="03.PNG" width="500">
<h2>03 看上去很美</h2>
<audio controls>
<source src="看上去很美.mp3" type="audio/mpeg">
</audio>

<img src="04.PNG" width="500">
<h2>04 去火星兜兜风</h2>
<audio controls>
<source src="去火星兜兜风.mp3" type="audio/mpeg">
</audio>

<img src="05.PNG" width="500">
<h2>05 火星咖啡馆</h2>
<audio controls>
<source src="火星咖啡馆.mp3" type="audio/mpeg">
</audio>

<img src="06.PNG" width="500">
<h2>06 Gone With Wind</h2>
<audio controls>
<source src="Gone With Wind.mp3" type="audio/mpeg">
</audio>

<img src="07.PNG" width="500">
<h2>07 答卷</h2>
<audio controls>
<source src="答卷.mp3" type="audio/mpeg">
</audio>

<img src="08.PNG" width="500">
<h2>08 火星酒吧夜</h2>
<audio controls>
<source src="火星酒吧夜.mp3" type="audio/mpeg">
</audio>

<img src="09.PNG" width="500">
<h2>09 夏天之路</h2>
<audio controls>
<source src="夏天之路.mp3" type="audio/mpeg">
</audio>

</div>

</body>
</html>
